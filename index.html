<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chat commun</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
  <h2>Choisis un pseudo</h2>
  <input id="name" placeholder="Pseudo">
  <button onclick="enter()">Entrer</button>
</div>

<div id="chat" class="hidden">
  <div id="messages"></div>

  <div id="inputBox">
    <input id="msg" placeholder="Message...">
    <button onclick="send()">Envoyer</button>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
